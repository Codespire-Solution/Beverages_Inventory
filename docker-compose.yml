version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: beverage-inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beverage_user
      POSTGRES_PASSWORD: beverage_pass
      POSTGRES_DB: beverage_inventory
    ports:
      - "5434:5432"
    volumes:
      - beverage_db_data:/var/lib/postgresql/data

volumes:
  beverage_db_data:
